<!-- Table Shimmer -->
@if (type() === 'table') {
    <div class="bg-white border border-slate-100 p-4 space-y-3">
      @for (row of rowArray; track $index) {
        <div class="flex items-center gap-4 py-2">
          <div class="shimmer h-4 w-8 rounded"></div>
          <div class="shimmer h-4 w-40 rounded"></div>
          <div class="shimmer h-4 w-32 rounded"></div>
          <div class="shimmer h-6 w-16 rounded-full ml-auto"></div>
          <div class="shimmer h-4 w-24 rounded"></div>
          <div class="shimmer h-4 w-24 rounded"></div>
          <div class="shimmer h-4 w-20 rounded"></div>
        </div>
      }
    </div>
  }
  
  <!-- Card Shimmer -->
  @if (type() === 'card') {
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-4">
      <div class="shimmer h-6 w-48 rounded"></div>
      <div class="shimmer h-4 w-full rounded"></div>
      <div class="shimmer h-4 w-3/4 rounded"></div>
      <div class="shimmer h-4 w-1/2 rounded"></div>
    </div>
  }
  
  <!-- Form Shimmer -->
  @if (type() === 'form') {
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-5">
      <div class="shimmer h-6 w-40 rounded mb-2"></div>
      @for (row of rowArray; track $index) {
        <div class="space-y-2">
          <div class="shimmer h-4 w-24 rounded"></div>
          <div class="shimmer h-10 w-full rounded-lg"></div>
        </div>
      }
      <div class="shimmer h-10 w-full rounded-lg mt-4"></div>
    </div>
  }
